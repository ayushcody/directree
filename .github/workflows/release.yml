name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm_dir: linux-x64
            bin: directree
          - os: macos-latest
            target: x86_64-apple-darwin
            npm_dir: darwin-x64
            bin: directree
          - os: macos-latest
            target: aarch64-apple-darwin
            npm_dir: darwin-arm64
            bin: directree
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            npm_dir: win32-x64
            bin: directree.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare npm package
        shell: bash
        run: |
          mkdir -p npm/platforms/${{ matrix.npm_dir }}/bin
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} npm/platforms/${{ matrix.npm_dir }}/bin/
          if [ "${{ matrix.npm_dir }}" != "win32-x64" ]; then
            chmod 755 npm/platforms/${{ matrix.npm_dir }}/bin/directree
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.npm_dir }}
          path: npm/platforms/${{ matrix.npm_dir }}
          retention-days: 1

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: npm/platforms

      - name: Move artifacts to correct layout
        # download-artifact puts them in npm/platforms/platform-*/ so we need to move them up
        run: |
          mv npm/platforms/platform-linux-x64/* npm/platforms/linux-x64/ || true
          mv npm/platforms/platform-darwin-x64/* npm/platforms/darwin-x64/ || true
          mv npm/platforms/platform-darwin-arm64/* npm/platforms/darwin-arm64/ || true
          mv npm/platforms/platform-win32-x64/* npm/platforms/win32-x64/ || true

      - name: Ensure executable permissions
        run: |
          chmod 755 npm/platforms/darwin-arm64/bin/directree || true
          chmod 755 npm/platforms/darwin-x64/bin/directree || true
          chmod 755 npm/platforms/linux-x64/bin/directree || true
          ls -l npm/platforms/*/bin/ || true

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          cd npm/platforms
          for dir in linux-x64 darwin-x64 darwin-arm64 win32-x64; do
            if [ -d "$dir" ]; then
              echo "Checking $dir..."
              cd "$dir"
              PKG_NAME=$(node -p "require('./package.json').name")
              PKG_VERSION=$(node -p "require('./package.json').version")
              EXISTING_VERSION=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || true)
              if [ "$EXISTING_VERSION" = "$PKG_VERSION" ]; then
                echo "$PKG_NAME@$PKG_VERSION already exists, skipping publish."
              else
                echo "Publishing $PKG_NAME@$PKG_VERSION..."
                npm publish --access public
              fi
              cd ..
            fi
          done

      - name: Publish meta package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          cd npm/directree
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXISTING_VERSION=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || true)
          if [ "$EXISTING_VERSION" = "$PKG_VERSION" ]; then
            echo "$PKG_NAME@$PKG_VERSION already exists, skipping publish."
          else
            echo "Publishing $PKG_NAME@$PKG_VERSION..."
            npm publish --access public
          fi
